<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transaction Ranking System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <h1>Transaction Ranking System</h1>
    <p>Secure transaction processing, user summaries, and fair ranking dashboard</p>
  </header>

  <section class="stats-container">
    <div class="stat-card">
      <h3>Total Users</h3>
      <p id="totalUsers">0</p>
    </div>

    <div class="stat-card">
      <h3>Total Transactions</h3>
      <p id="totalTransactions">0</p>
    </div>

    <div class="stat-card">
      <h3>Top Score</h3>
      <p id="topScore">0</p>
    </div>
  </section>

  <main class="container">

    <section class="card">
      <h2>Add Transaction</h2>

      <div class="form-grid">
        <input type="text" id="userId" placeholder="User ID" />
        <input type="number" id="amount" placeholder="Amount" />

        <select id="type">
          <option value="credit">Credit</option>
          <option value="debit">Debit</option>
        </select>
      </div>

      <button id="submitBtn">Process Transaction</button>
      <p id="message"></p>
    </section>

    <section class="card">
      <h2>User Summary</h2>

      <div class="summary-box">
        <input type="text" id="summaryUserId" placeholder="Enter User ID" />
        <button id="summaryBtn">Get Summary</button>
      </div>

      <div id="summaryResult" class="summary-result">
        User summary will appear here...
      </div>
    </section>

    <section class="card full-width">
      <div class="card-header">
        <h2>Ranking Leaderboard</h2>
        <button id="rankingBtn">Load Ranking</button>
      </div>

      <div id="rankingResult">
        <p class="empty-text">Ranking data will appear here...</p>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
